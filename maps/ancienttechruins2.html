<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Megabyte Punch Atlas</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body class="map-page" data-map-id="ancienttechruins2">
<div class="site-chrome"></div>
<main class="map-layout">
    <header class="shell-panel page-topbar">
        <a class="back-link" href="../index.html">Stage Select</a>
        <div>
            <p class="eyebrow" id="mapChapter"></p>
            <h1 class="map-title" id="mapTitle"></h1>
            <p class="map-summary" id="mapSummary"></p>
        </div>
        <div class="status-badge" id="mapStatus"></div>
    </header>
    <section class="map-shell">
        <div class="shell-panel map-toolbar">
            <div class="toolbar-group">
                <button type="button" class="toolbar-button" id="zoomOutButton">-</button>
                <button type="button" class="toolbar-button" id="zoomInButton">+</button>
                <button type="button" class="toolbar-button" id="fitButton">Fit</button>
            </div>
            <div class="toolbar-group toolbar-group--coords">
                <span class="coords-readout" id="coordsReadout">X: 0 Y: 0</span>
            </div>
        </div>
        <div class="map-note" id="mapNote"></div>
        <div class="map-viewport" id="mapViewport">
            <div class="map-canvas" id="mapCanvas">
                <img class="map-image" id="mapImage" alt="">
                <div class="marker-layer" id="markerLayer"></div>
            </div>
        </div>
    </section>
    <aside class="map-sidebar">
        <section class="shell-panel legend-panel">
            <div class="panel-heading">
                <p class="eyebrow">Overlay</p>
                <h2>Marker Filters</h2>
            </div>
            <div id="legendContent"></div>
        </section>
        <section class="shell-panel help-panel">
            <div class="panel-heading">
                <p class="eyebrow">Controls</p>
                <h2>Navigation</h2>
            </div>
            <p>Drag to pan the map. Use the wheel or zoom buttons to change scale. Click inside the viewport to copy map coordinates.</p>
        </section>
    </aside>
</main>
<script type="module" src="../js/map-engine.js"></script>
</body>
</html>
