<!DOCTYPE html>
<html>
<head>
  <title>Megabyte Punch Map</title>

  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

<div class="map-container">

  <div class="legend" id="legend">
    <h3 id="title"></h3>
  </div>

  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="../js/maps.js"></script>
<script src="../js/megabyte-data.js"></script>

<script>
const mapKey = "map2"; // change for other pages
const data = MEGABYTE_MAPS[mapKey];

document.getElementById("title").innerText = data.title;

// CUSTOM ICONS (your assets)
initMap("map", data.image, (map) => {
  // marker setup
});
  
  const icons = {
    Start: createIcon("../assets/marker-megabyte-start.png"),
    End: createIcon("../assets/marker-megabyte-start.png"),
    Checkpoint: createIcon("../assets/marker-megabyte-checkpoint.png"),
    BitChest: createIcon("../assets/marker-megabyte-bitchest.png"),
    PartChest: createIcon("../assets/marker-megabyte-partchest.png"),
    ColorCapsule: createIcon("../assets/marker-megabyte-color.png")
  };

  const layers = {};

  Object.keys(data.categories).forEach(category => {
    const layer = L.layerGroup().addTo(map);
    layers[category] = layer;

    addMarkers(map, data.categories[category], layer, icons[category]);
  });

  buildLegend(map, layers);
});
