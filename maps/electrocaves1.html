<div id="mapView">
    <div id="mapWrapper">
        <img src="../images/electro1.png" class="map-img">

        <div class="marker start" style="left: 100px; top: 300px;"></div>
        <div class="marker checkpoint" style="left: 200px; top: 300px;"></div>
        <div class="marker bitchest" style="left: 300px; top: 300px;"></div>
        <div class="marker partchest" style="left: 400px; top: 300px;"></div>
        <div class="marker colorcapsule" style="left: 500px; top: 300px;"></div>
        <div class="marker stageexit" style="left: 600px; top: 300px;"></div>
    </div>

    <div class="legend">
        <label><input type="checkbox" data-type="start" checked> Start</label>
        <label><input type="checkbox" data-type="checkpoint" checked> Checkpoint</label>
        <label><input type="checkbox" data-type="bitchest" checked> Bit Chest</label>
        <label><input type="checkbox" data-type="partchest" checked> Part Chest</label>
        <label><input type="checkbox" data-type="colorcapsule" checked> Color Capsule</label>
        <label><input type="checkbox" data-type="stageexit" checked> Stage Exit</label>
        <div id="toggleAll">Toggle All</div>
    </div>

    <div class="zoom-controls">
        <button id="zoomIn">+</button>
        <button id="zoomOut">-</button>
    </div>

    <div class="back-btn" onclick="window.location.href='../index.html'">← Back</div>

    <div id="coords">X: 0 Y: 0</div>
</div>

<style>
.marker {
    image-rendering: crisp-edges;
    position: absolute;
    width: 24px;
    height: 24px;
    transform: translate(-50%, -50%);
    pointer-events: none;
}

.marker.start {
    background: url('../images/markers/marker-start.png') no-repeat center/contain;
}

.marker.checkpoint {
    background: url('../images/markers/marker-checkpoint.png') no-repeat center/contain;
}

.marker.bitchest {
    background: url('../images/markers/marker-bitchest.png') no-repeat center/contain;
}

.marker.partchest {
    background: url('../images/markers/marker-partchest.png') no-repeat center/contain;
}

.marker.colorcapsule {
    background: url('../images/markers/marker-colorcapsule.png') no-repeat center/contain;
}

.marker.stageexit {
    background: url('../images/markers/marker-stageexit.png') no-repeat center/contain;
}

</style>

<script>
document.querySelectorAll('.legend input').forEach(input => {
    input.addEventListener('change', () => {
        const type = input.dataset.type;
        document.querySelectorAll('.marker.' + type).forEach(m => {
            m.style.display = input.checked ? 'block' : 'none';
        });
    });
});
</script>
