<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Videogame Cartography</title>

<style>
    body {
        margin: 0;
        background-color: #000;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 60px;
        font-size: 48px;
        font-family: 'Georgia', serif;
    }

    h2 {
        margin-top: 10px;
        color: red;
        font-size: 20px;
        font-weight: normal;
        font-family: 'Georgia', serif;
    }

    .button-container {
        margin-top: 60px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .game-button {
        padding: 20px 30px;
        background-color: #111;
        border: 2px solid #444;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .game-button:hover {
        transform: scale(1.08);
        background-color: #222;
    }
</style>
</head>

<body>

<h1>VIDEOGAME CARTOGRAPHY</h1>
<h2>By AndresofAstora</h2>

<div class="button-container">
    <button class="game-button">Hollow Knight: Silksong</button>
    <button class="game-button">Mortal Shell</button>
    <button class="game-button">Lies of P</button>
    <button class="game-button">Megabyte Punch</button>
</div>

</body>
</html>
