<!DOCTYPE html>
<html lang="en">
<head>

<link rel="stylesheet" href="css/styles.css">

<body class="site-home-page">
<div class="site-chrome"></div>
<main class="home-layout">

        <h1 class="site-title">Videogame Cartography</h1>
        <p class="site-subtitle">

        </p>
    </header>
    <section class="browser-panel browser-panel--minimal">
        <div class="game-grid">
            <article class="game-card stage-card">
                <a class="stage-card__link" href="megabyte-punch.html" aria-label="Megabyte Punch">
                    <div class="stage-card__art" style="background-image: url('assets/gamecards/megabytepunch.jpg');"></div>
                    <div class="stage-card__body stage-card__body--minimal">

            <article class="game-card stage-card">

                    </div>

            </article>
            <article class="game-card stage-card">

                </a>

            <article class="game-card stage-card">
                <a class="stage-card__link" href="lies-of-p.html" aria-label="Lies of P">
                    <div class="stage-card__art" style="background-image: url('assets/gamecards/liesofp.jpg');"></div>
                    <div class="stage-card__body stage-card__body--minimal">
                        <h2 class="stage-card__title">Lies of P</h2>
