<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Videogame Cartography</title>

<link href="https://fonts.googleapis.com/css2?family=Serlio&display=swap" rel="stylesheet">
    
<style>
body {
    margin: 0;
    background-color: #000;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 60px;
    font-size: 48px;
    font-family: 'Serlio', serif;
}

h2 {
    margin-top: 10px;
    color: red;
    font-size: 20px;
    font-weight: normal;
    font-family: 'Serlio', serif;
}

.button-container {
    margin-top: 60px;
    display: flex;
    justify-content: center;
    gap: 20px;
}

/* Base button style for clickable links */
.game-button {
    display: inline-block;
    background-color: #111;
    border: 2px solid #444;
    border-radius: 10px;
    width: 220px;
    height: 120px;
    padding: 0;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.2s ease, background-color 0.2s ease;
    overflow: hidden;
}

/* Image buttons */
.game-image {
    position: relative;
    background-image: var(--bg);
    background-size: cover;
    background-position: center;
}

/* Dark overlay for readability and contrast */
.game-image::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.2); /* slightly dark */
    transition: background 0.2s ease;
}

/* Subtle vignette for edges */
.game-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(0,0,0,0.0) 70%, rgba(0,0,0,0.2) 100%);
    pointer-events: none;
}

/* Hover: remove overlay + grow */
.game-image:hover::before {
    background: rgba(0, 0, 0, 0); /* fully transparent */
}

.game-image:hover {
    transform: scale(1.08);
}
</style>
</head>

<body>

<h1>VIDEOGAME CARTOGRAPHY</h1>
<h2>By ANDRESOFASTORA</h2>

<div class="button-container">
    <a href="./silksong.html" class="game-button game-image" style="--bg:url('images/silksong.jpg')"></a>

    <a href="./mortalshell.html" class="game-button game-image" style="--bg:url('images/mortalshell.jpg')"></a>

    <a href="./liesofp.html" class="game-button game-image" style="--bg:url('images/liesofp.jpg')"></a>

    <a href="./megabytepunch.html" class="game-button game-image" style="--bg:url('images/megabytepunch.jpg')"></a>
</div>

</body>
</html>
