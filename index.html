<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Megabyte Punch Map</title>

</head>

<body>

<div id="menu" class="menu">
    <div class="map-btn" data-map="map1">Electro Caves 1</div>
    <div class="map-btn" data-map="map2">Electro Caves 2</div>
    <div class="map-btn" data-map="map3">Electro Caves 3</div>
    <div class="map-btn" data-map="map4">Lost Megaclopolis 1</div>
    <div class="map-btn" data-map="map5">Lost Megaclopolis 2</div>
    <div class="map-btn" data-map="map6">Lost Megaclopolis 3</div>
</div>

<div id="mapView" class="hidden map-container">

    <div class="back-btn">← Back</div>

    <div id="mapWrapper" class="map-wrapper">
        <img id="mapImage" class="map-img" src="">
        <div id="markers"></div>
    </div>

    <div class="zoom-controls">
        <div class="zoom-btn" id="zoomIn">+</div>
        <div class="zoom-btn" id="zoomOut">−</div>
    </div>

    <div class="legend">
        <label><input type="checkbox" checked data-type="start"> Start</label><br>
        <label><input type="checkbox" checked data-type="checkpoint"> Checkpoint</label><br>
        <label><input type="checkbox" checked data-type="bit-chest"> Bit Chest</label><br>
        <label><input type="checkbox" checked data-type="part-chest"> Part Chest</label><br>
        <label><input type="checkbox" checked data-type="color-capsule"> Color Capsule</label><br>
        <label><input type="checkbox" checked data-type="stage-exit"> Stage Exit</label><br>
        <button id="toggleAll">Toggle All</button>
    </div>

    <div class="coords" id="coords">X: 0 Y: 0</div>

</div>

</body>
</html>
