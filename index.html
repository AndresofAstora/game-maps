<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Videogame Cartography</title>

<link href="https://fonts.googleapis.com/css2?family=Serlio&display=swap" rel="stylesheet">
    
<style>
    body {
        margin: 0;
        background-color: #000;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 60px;
        font-size: 48px;
        font-family: 'Serlio', serif;
    }

    h2 {
        margin-top: 10px;
        color: red;
        font-size: 20px;
        font-weight: normal;
        font-family: 'Serlio', serif;
    }

    .button-container {
        margin-top: 60px;
        display: flex;
        justify-content: center;
        gap: 20px;
    }

    .game-button {
        display: inline-block;
        padding: 20px 30px;
        background-color: #111;
        border: 2px solid #444;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .game-button:hover {
        transform: scale(1.08);
        background-color: #222;
    }
</style>
</head>

<body>

<h1>VIDEOGAME CARTOGRAPHY</h1>
<h2>By ANDRESOFASTORA</h2>

<div class="button-container">
    <a href="./silksong.html" class="game-card">
        <img src="images/silksong.jpg" alt="Silksong">
        <span>Hollow Knight: Silksong</span>
    </a>

    <a href="./mortalshell.html" class="game-card">
        <img src="images/mortalshell.jpg" alt="Mortal Shell">
        <span>Mortal Shell</span>
    </a>

    <a href="./liesofp.html" class="game-card">
        <img src="images/liesofp.jpg" alt="Lies of P">
        <span>Lies of P</span>
    </a>

    <a href="./megabytepunch.html" class="game-card">
        <img src="images/megabytepunch.jpg" alt="Megabyte Punch">
        <span>Megabyte Punch</span>
    </a>
</div>

</body>
</html>
