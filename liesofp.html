<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lies of P Maps</title>

<style>
    body {
        margin: 0;
        background-color: #000;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 60px;
        font-size: 42px;
    }

    .button-container {
        margin-top: 60px;
        display: flex;
        justify-content: center;
    }

    .game-button {
        padding: 20px 30px;
        background-color: #111;
        border: 2px solid #444;
        border-radius: 10px;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: transform 0.2s ease, background-color 0.2s ease;
    }

    .game-button:hover {
        transform: scale(1.08);
        background-color: #222;
    }
</style>
</head>

<body>

<h1>Lies of P</h1>

<div class="button-container">
    <button class="game-button">Krat Central Station</button>
</div>

</body>
</html>
